name: Buildy CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    env:
      # Prisma 7's TypeScript config (prisma.config.ts) reads DATABASE_URL
      # eagerly even for `prisma generate`. CI doesn't connect to a real DB —
      # this placeholder just makes the env var resolvable for codegen.
      DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run lint
        run: npm run lint --if-present

      - name: Run type check
        run: npm run typecheck --if-present

      - name: Build app
        run: npm run build
